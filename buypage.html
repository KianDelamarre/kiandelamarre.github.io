<!DOCTYPE html>
<html lang="en"  dir="ltr">
<head>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="dropdown">
        <button class="menu">Menu &#9776</button>
        <div class="dropdownContent">
            <a href="index.html">Home</a>
            <a href="About.html">About us</a>
            <a href="Contact.html">Contact</a>
        </div>
    </div>

    <div class="container">
        <div id="cardImagesAndDeb">
            <div id="debOrCred">Debit / Credit Card</div>
            <div class="cardImage"><img src="images/cards.png" id="cardImg"></div>
        </div>
        <form action="">
            <h2>Card details</h1>

                <div class="input-box">
                    <span>Card number</span>
                    <input type="text" id="card-number-input" class="card-number-input"
                        placeholder="1111 2222 3333 4444">
                </div>

                <div class="exp-cvv-titles">
                    <div class="exp-cvv">
                        <div class="input-box" id="expDate">
                            <span>Expiry Date</span>
                        </div>

                        <div class="input-box">
                            <span>CVV</span>
                        </div>
                    </div>

                    <div class="exp-cvv-input">
                        <div class="expiry">
                            <div class="input-box">
                                <select id="expiry-month">
                                    <option value="month">Month</option>
                                </select>
                            </div>

                            <div class="input-box">
                                <select id="expiry-year">
                                    <option value="year">Year</option>
                                </select>
                            </div>
                        </div>

                        <div class="input-box">
                            <input type="text" id="cvv-input" class="cvv-input" placeholder="CVV (3-4 digits)">
                        </div>
                    </div>
                </div>

                <div id="alert"></div>

                <div class="submit-btn-div">
                    <button type="button" id="submit-btn" class="submit-btn">Submit</button>
                </div>
        </form>
    </div>
</body>

<script src="js/script.js"></script>

</html>
